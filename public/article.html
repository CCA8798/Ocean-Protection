<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - 海洋守护者</title>
  <style>
    :root {
      --bg-start: #e0f2f7;
      --bg-end: #b2dfee;
      --card-bg: rgba(255, 255, 255, 0.75);
      --border: rgba(120, 180, 200, 0.4);
      --text: #0b3a4a;
      --text-light: #2d5a6e;
      --accent: #00897b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text);
    }
    .article-container {
      width: 100%;
      max-width: 1100px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 50px 60px;
      box-shadow: 0 12px 35px rgba(0,80,100,0.12);
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #043b4e;
      margin-bottom: 15px;
      line-height: 1.3;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding-bottom: 22px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(0,120,140,0.2);
      font-size: 0.95rem;
      color: var(--text-light);
    }
    .tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(0,150,136,0.12);
      border: 1px solid rgba(0,150,136,0.35);
      color: #00695c;
    }
    .content {
      font-size: 1.08rem;
      line-height: 2;
      color: #134b5a;
      white-space: pre-wrap;      /* 保留换行，配合<br>双保险 */
      word-break: break-word;
    }
    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 15px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 35px;
      padding: 10px 26px;
      border-radius: 30px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,150,136,0.3);
      color: #0077b6;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    .back-link:hover {
      background: white;
      border-color: #00897b;
      box-shadow: 0 6px 18px rgba(0,120,120,0.2);
      transform: translateY(-2px);
    }
    @media (max-width: 800px) {
      .article-container { padding: 30px 25px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="article-container">
    <h1 id="article-title">加载中…</h1>
    <div class="meta" id="article-meta"></div>
    <div class="content" id="article-content"></div>
    <a href="/" class="back-link">← 返回首页</a>
  </div>

  <script>
    (async () => {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        document.getElementById('article-title').textContent = '未指定文章';
        return;
      }
      try {
        const res = await fetch(`/api/articles/${encodeURIComponent(id)}`);
        if (!res.ok) throw new Error('文章不存在');
        const article = await res.json();
        document.title = article.title + ' - 海洋守护者';
        document.getElementById('article-title').textContent = article.title;
        document.getElementById('article-meta').innerHTML = `
          <span>📅 ${escapeHtml(article.date)}</span>
          <span>✍️ ${escapeHtml(article.author || '匿名')}</span>
          ${article.tags ? article.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('') : ''}
        `;
        // ✅ 核心修复：将 \n 替换为 <br> ，确保换行显示
        document.getElementById('article-content').innerHTML =
          article.content.replace(/\n/g, '<br>');
      } catch (err) {
        document.getElementById('article-title').textContent = '加载失败';
        document.getElementById('article-content').textContent = '文章数据获取失败，请检查网络。';
      }
    })();

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
