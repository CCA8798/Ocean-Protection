<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - 海洋守护者</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <style>
    :root {
      --glass-bg: rgba(5, 25, 45, 0.65);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-primary: #e6f4fa;
      --text-secondary: #b0d4e8;
      --accent: #00d4aa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      background: #020e18;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text-primary);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }
    .article-container {
      width: 100%;
      max-width: 1100px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 50px 60px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #e8f8ff;
      margin-bottom: 15px;
      line-height: 1.3;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding-bottom: 22px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 0.95rem;
      color: var(--text-secondary);
    }
    .tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(0, 180, 180, 0.2);
      border: 1px solid rgba(0, 200, 180, 0.4);
      color: #9fffe8;
    }
    .content {
      font-size: 1.08rem;
      line-height: 2;
      color: #d0e8f4;
      word-break: break-word;
    }
    .content strong {
      color: #7fffe0;
    }
    .content blockquote {
      border-left: 3px solid var(--accent);
      margin: 20px 0;
      padding: 10px 20px;
      background: rgba(0, 212, 170, 0.06);
      border-radius: 0 8px 8px 0;
      color: #b0e8dc;
      font-style: italic;
    }
    .content ul, .content ol {
      padding-left: 24px;
      margin: 12px 0;
    }
    .content li {
      margin: 6px 0;
    }
    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 15px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .content h2 {
      font-size: 1.6rem;
      color: #cceeff;
      margin: 30px 0 15px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 35px;
      padding: 10px 26px;
      border-radius: 30px;
      background: rgba(5, 25, 45, 0.55);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(12px);
      transition: all 0.3s;
    }
    .back-link:hover {
      background: rgba(5, 25, 45, 0.7);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 212, 170, 0.4);
      transform: translateY(-2px);
    }
    .chart-wrap {
      margin: 25px 0;
      padding: 20px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .chart-wrap .chart-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .chart-wrap svg {
      max-width: 100%;
      height: auto;
    }
    .article-layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
    .article-main { flex: 1; min-width: 0; }
    .toc {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: 40px;
      background: rgba(5, 25, 45, 0.5);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .toc-hidden { display: none !important; }
    .toc-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .toc ul { list-style: none; padding: 0; margin: 0; }
    .toc li { margin: 2px 0; }
    .toc a {
      display: block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
      border-left: 2px solid transparent;
      line-height: 1.4;
    }
    .toc a:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .toc a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(0, 212, 170, 0.08);
    }
    @media (max-width: 900px) {
      .article-layout { flex-direction: column; }
      .toc {
        width: 100%;
        position: static;
        margin-bottom: 20px;
        max-height: 200px;
        overflow-y: auto;
      }
    }
    @media (max-width: 800px) {
      .article-container { padding: 30px 25px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="article-container">
    <div class="article-layout">
      <div class="article-main">
        <h1 id="article-title">加载中…</h1>
        <div class="meta" id="article-meta"></div>
        <div class="content" id="article-content"></div>
        <a href="/" class="back-link">← 返回首页</a>
      </div>
      <nav class="toc toc-hidden" id="article-toc">
        <div class="toc-title">📑 目录</div>
        <ul id="toc-list"></ul>
      </nav>
    </div>
  </div>

  <script>
    (async () => {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        document.getElementById('article-title').textContent = '未指定文章';
        return;
      }
      try {
        const res = await fetch(`/api/articles/${encodeURIComponent(id)}`);
        if (!res.ok) throw new Error('文章不存在');
        const article = await res.json();
        document.title = article.title + ' - 海洋守护者';
        document.getElementById('article-title').textContent = article.title;
        document.getElementById('article-meta').innerHTML = `
          <span>📅 ${escapeHtml(article.date)}</span>
          <span>✍️ ${escapeHtml(article.author || '匿名')}</span>
          ${article.tags ? article.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('') : ''}
        `;
        // 使用 marked 将 Markdown 渲染为 HTML
        try {
          document.getElementById('article-content').innerHTML =
            marked.parse(article.content);
        } catch (e) {
          document.getElementById('article-content').innerHTML =
            article.content.replace(/\n/g, '<br>');
        }
        // 渲染内嵌图表
        renderArticleCharts();
        // 构建目录
        buildTOC();
      } catch (err) {
        document.getElementById('article-title').textContent = '加载失败';
        document.getElementById('article-content').textContent = '文章数据获取失败，请检查网络。';
      }
    })();

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== 目录生成 ==========
    function buildTOC() {
      var content = document.getElementById('article-content');
      if (!content) return;
      var headings = content.querySelectorAll('h2');
      var toc = document.getElementById('toc-list');
      var tocNav = document.getElementById('article-toc');
      if (!toc || !tocNav) return;
      if (headings.length < 2) { tocNav.classList.add('toc-hidden'); return; }
      tocNav.classList.remove('toc-hidden');
      headings.forEach(function(h2, index) {
        var id = 'section-' + index;
        h2.id = id;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h2.textContent;
        li.appendChild(a);
        toc.appendChild(li);
      });
      // 平滑滚动
      toc.addEventListener('click', function(e) {
        var target = e.target;
        if (target.tagName === 'A') {
          e.preventDefault();
          var href = target.getAttribute('href');
          var el = document.getElementById(href.substring(1));
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', window.location.pathname + window.location.search);
        }
      });
      // 滚动追踪
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            toc.querySelectorAll('a').forEach(function(a) { a.classList.remove('active'); });
            var link = toc.querySelector('a[href="#' + entry.target.id + '"]');
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-80px 0px -60% 0px' });
      headings.forEach(function(h2) { observer.observe(h2); });
    }

    // ========== 图表渲染引擎 ==========
    function renderArticleCharts() {
      document.querySelectorAll('.chart').forEach(function(el) {
        var type = el.dataset.type;
        var title = el.dataset.title || '';
        if (type === 'bar') renderBarChart(el, title);
        else if (type === 'pie') renderPieChart(el, title);
        else if (type === 'world-map') renderWorldMap(el, title);
      });
    }

    function renderBarChart(container, title) {
      var labels, values, colors;
      try { labels = JSON.parse(container.dataset.labels); values = JSON.parse(container.dataset.values); } catch(e) { return; }
      colors = JSON.parse(container.dataset.colors || '[]');
      var max = Math.max.apply(null, values);
      var w = 600, h = 220, pad = 50, gap = 20;
      var barW = (w - pad - gap * (labels.length + 1)) / labels.length;
      var svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" xmlns="http://www.w3.org/2000/svg">';
      svg += '<rect width="' + w + '" height="' + h + '" fill="none"/>';
      // grid lines
      for (var g = 0; g <= 4; g++) {
        var y = h - 30 - (g / 4) * (h - 60);
        svg += '<line x1="40" y1="' + y + '" x2="' + (w-10) + '" y2="' + y + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
        svg += '<text x="35" y="' + (y+4) + '" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="end">' + Math.round(max * g / 4) + '</text>';
      }
      for (var i = 0; i < labels.length; i++) {
        var x = pad + gap + i * (barW + gap);
        var barH = (values[i] / max) * (h - 70);
        var c = colors[i] || '#00d4aa';
        svg += '<rect x="' + x + '" y="' + (h - 30 - barH) + '" width="' + barW + '" height="' + barH + '" fill="' + c + '" rx="3"><animate attributeName="height" from="0" to="' + barH + '" dur="0.6s" fill="freeze"/><animate attributeName="y" from="' + (h - 30) + '" to="' + (h - 30 - barH) + '" dur="0.6s" fill="freeze"/></rect>';
        svg += '<text x="' + (x + barW/2) + '" y="' + (h - 12) + '" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">' + escapeHtml(labels[i]) + '</text>';
      }
      svg += '</svg>';
      container.innerHTML = (title ? '<div class="chart-title">' + escapeHtml(title) + '</div>' : '') + svg;
    }

    function renderPieChart(container, title) {
      var labels, values, colors;
      try { labels = JSON.parse(container.dataset.labels); values = JSON.parse(container.dataset.values); } catch(e) { return; }
      colors = JSON.parse(container.dataset.colors || '[]');
      var total = values.reduce(function(a,b) { return a+b; }, 0);
      var cx = 150, cy = 150, r = 100;
      var svg = '<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">';
      var angle = -90;
      var defColors = ['#00d4aa','#ff6b6b','#ff9f43','#4ecdc4','#a29bfe','#fd79a8','#ffeaa7','#74b9ff'];
      for (var i = 0; i < values.length; i++) {
        var pct = values[i] / total;
        var a = pct * 360;
        var endAngle = angle + a;
        var sr = (angle * Math.PI / 180), er = (endAngle * Math.PI / 180);
        var x1 = cx + r * Math.cos(sr), y1 = cy + r * Math.sin(sr);
        var x2 = cx + r * Math.cos(er), y2 = cy + r * Math.sin(er);
        var large = a > 180 ? 1 : 0;
        var c = colors[i] || defColors[i % defColors.length];
        svg += '<path d="M' + cx + ',' + cy + ' L' + x1 + ',' + y1 + ' A' + r + ',' + r + ' 0 ' + large + ',1 ' + x2 + ',' + y2 + ' Z" fill="' + c + '"><animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze"/></path>';
        // label
        var lx = cx + (r * 0.65) * Math.cos(sr + (er - sr) / 2);
        var ly = cy + (r * 0.65) * Math.sin(sr + (er - sr) / 2);
        if (values[i] > total * 0.05) {
          svg += '<text x="' + lx + '" y="' + ly + '" fill="#fff" font-size="12" text-anchor="middle" dominant-baseline="middle">' + Math.round(pct * 100) + '%</text>';
        }
        angle = endAngle;
      }
      // legend
      var ly2 = 20;
      for (var i = 0; i < labels.length; i++) {
        var c = colors[i] || defColors[i % defColors.length];
        svg += '<rect x="280" y="' + (ly2 + i*22) + '" width="12" height="12" rx="2" fill="' + c + '"/>';
        svg += '<text x="298" y="' + (ly2 + i*22 + 10) + '" fill="rgba(255,255,255,0.7)" font-size="12">' + escapeHtml(labels[i]) + ' ' + values[i] + '</text>';
      }
      svg += '</svg>';
      container.innerHTML = (title ? '<div class="chart-title">' + escapeHtml(title) + '</div>' : '') + svg;
    }

    // 简化版世界地图（各大洋板块高亮）
    function renderWorldMap(container, title) {
      var highlights;
      try { highlights = JSON.parse(container.dataset.highlights || '[]'); } catch(e) { highlights = []; }
      var colorMap = {
        '太平洋': '#00d4aa', '大西洋': '#4ecdc4', '印度洋': '#a29bfe',
        '北冰洋': '#74b9ff', '南海': '#ff9f43', '地中海': '#ff6b6b',
        '加勒比海': '#fd79a8', '珊瑚海': '#ffeaa7'
      };
      // Simplified world map using positioned circles for oceans
      var oceans = [
        { name:'太平洋', cx:200, cy:160, r:90, rx:0.9 },
        { name:'大西洋', cx:380, cy:170, r:65, rx:0.8 },
        { name:'印度洋', cx:500, cy:190, r:55, rx:0.7 },
        { name:'北冰洋', cx:320, cy:50, r:40, rx:0.6 },
        { name:'南海', cx:470, cy:230, r:30, rx:0.5 },
        { name:'地中海', cx:400, cy:140, r:20, rx:0.4 },
        { name:'加勒比海', cx:300, cy:165, r:22, rx:0.4 },
        { name:'珊瑚海', cx:530, cy:240, r:25, rx:0.3 }
      ];
      var svg = '<svg viewBox="0 0 650 320" xmlns="http://www.w3.org/2000/svg">';
      svg += '<rect width="650" height="320" fill="none"/>';
      // background grid (latitude/longitude)
      for (var i = 0; i <= 4; i++) {
        svg += '<ellipse cx="325" cy="160" rx="' + (60 + i*80) + '" ry="' + (30 + i*40) + '" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>';
      }
      // continents (simplified as polygons)
      svg += '<path d="M330,40 L370,50 L400,60 L420,50 L430,70 L410,100 L420,130 L400,150 L380,140 L370,160 L350,170 L330,150 L340,120 L320,100 L300,80 Z" fill="rgba(255,255,255,0.07)"/>';
      svg += '<path d="M220,80 L270,70 L290,90 L310,110 L300,140 L280,160 L250,150 L230,130 L210,100 Z" fill="rgba(255,255,255,0.07)"/>';
      svg += '<path d="M480,90 L530,100 L550,130 L540,160 L520,180 L490,190 L470,170 L460,140 L465,110 Z" fill="rgba(255,255,255,0.07)"/>';
      svg += '<path d="M260,195 L320,200 L370,210 L350,240 L300,250 L250,230 Z" fill="rgba(255,255,255,0.07)"/>';
      // ocean circles with animation
      for (var i = 0; i < oceans.length; i++) {
        var o = oceans[i];
        var isHL = highlights.indexOf(o.name) >= 0;
        var color = colorMap[o.name] || '#00d4aa';
        var opacity = isHL ? 0.35 : 0.1;
        var pulse = isHL ? '<animate attributeName="r" values="' + o.r + ';' + (o.r+8) + ';' + o.r + '" dur="3s" repeatCount="indefinite"/>' : '';
        svg += '<circle cx="' + o.cx + '" cy="' + o.cy + '" r="' + o.r + '" fill="' + color + '" opacity="' + opacity + '">' + pulse + '</circle>';
        if (isHL) {
          svg += '<circle cx="' + o.cx + '" cy="' + o.cy + '" r="' + (o.r-10) + '" fill="none" stroke="' + color + '" stroke-width="2" opacity="0.5"><animate attributeName="r" from="' + o.r + '" to="' + (o.r+15) + '" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite"/></circle>';
        }
        svg += '<text x="' + o.cx + '" y="' + (o.cy + 3) + '" fill="' + (isHL ? '#fff' : 'rgba(255,255,255,0.3)') + '" font-size="' + (isHL ? 14 : 10) + '" text-anchor="middle" font-weight="' + (isHL ? 'bold' : 'normal') + '">' + o.name + '</text>';
      }
      svg += '</svg>';
      container.innerHTML = (title ? '<div class="chart-title">' + escapeHtml(title) + '</div>' : '') + svg;
    }
  </script>
</body>
</html>
